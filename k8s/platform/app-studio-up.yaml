apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-studio-up
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/k8s-platform.git
    targetRevision: main
    path: k8s/apps/app-studio-up
  destination:
    server: https://kubernetes.default.svc
    namespace: app-studio-up
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
