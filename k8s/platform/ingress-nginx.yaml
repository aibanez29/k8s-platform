apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1
    helm:
      values: |
        controller:
          # Single node, no cloud LoadBalancer to provision. A DaemonSet with
          # hostPort binds :80/:443 on the node itself — the VPS public IP *is*
          # the ingress address. Do not switch to type: LoadBalancer; without
          # ServiceLB/MetalLB the Service would sit in <pending> forever.
          kind: DaemonSet
          hostPort:
            enabled: true
            ports:
              http: 80
              https: 443
          service:
            type: ClusterIP
          ingressClassResource:
            default: true
          config:
            use-forwarded-headers: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
