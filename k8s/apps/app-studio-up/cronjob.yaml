apiVersion: batch/v1
kind: CronJob
metadata:
  name: rotate-questions
  namespace: app-studio-up
spec:
  schedule: "0 3 * * 0"  # Sundays at 3am
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: ghcr-pull-secret
          containers:
            - name: rotate
              image: ghcr.io/aibanez29/app-studio-up:latest
              command: ["npx", "tsx", "scripts/rotate-questions.ts"]
              env:
                - name: NODE_ENV
                  value: production
                - name: QUESTIONS_PER_EXAM
                  value: "15"
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: app-studio-up-secret
                      key: DATABASE_URL
                - name: DEEPSEEK_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: app-studio-up-secret
                      key: DEEPSEEK_API_KEY
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
