# OpenBao UI. Exposed, but it is sealed on every boot and refuses to serve anything
# until unsealed — so a public URL alone gets an attacker a "sealed" banner.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openbao-ui
  namespace: openbao
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: bao.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openbao
                port:
                  number: 8200
  tls:
    - hosts:
        - bao.example.com
      secretName: openbao-tls
